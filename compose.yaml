services:
  web:
    image: chronosplit-web:local
    build:
      context: .
    init: true
    ports:
      - "${CHRONOSPLIT_PORT:-8080}:8080"
    environment:
      MOBILE_AUTH_TOKEN: "${CHRONOSPLIT_MOBILE_AUTH_TOKEN:-}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s
